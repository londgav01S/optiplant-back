spring:
  application:
    name: aptiplant-back
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventario_db}
    username: ${SPRING_DATASOURCE_USERNAME:inventario_user}
    password: ${SPRING_DATASOURCE_PASSWORD:inventario_pass}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:aptiplant-dev-secret-change-this-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

